<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelScholar // Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --silver: #e0e0e0; --border: #222; --dim: #666; }
        body { 
            margin: 0; background: var(--bg); color: var(--silver); 
            font-family: 'Inter', sans-serif; height: 100vh; 
            display: flex; align-items: center; justify-content: center;
        }

        .auth-container {
            width: 100%; max-width: 400px; padding: 40px;
            background: var(--card); border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; text-align: center; margin-bottom: 30px; font-size: 1.2rem; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; color: var(--dim); margin-bottom: 8px; letter-spacing: 2px; }
        
        input {
            width: 100%; background: transparent; border: none; 
            border-bottom: 1px solid var(--border); color: white;
            padding: 10px 0; font-family: 'Inter', sans-serif; outline: none;
            transition: border-color 0.4s;
        }
        input:focus { border-bottom-color: var(--silver); }

        .btn-main {
            width: 100%; padding: 15px; margin-top: 20px;
            background: var(--silver); color: var(--bg); border: none;
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem; 
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .btn-main:hover { opacity: 0.8; transform: translateY(-2px); }

        .toggle-link {
            display: block; text-align: center; margin-top: 20px;
            font-size: 0.7rem; color: var(--dim); cursor: pointer; text-decoration: underline;
        }

        #message { font-size: 0.7rem; text-align: center; margin-top: 15px; min-height: 1em; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2 id="auth-title">IDENTIFY_USER</h2>
        
        <div id="reg-fields" style="display: none;">
            <div class="form-group">
                <label>FULL_NAME</label>
                <input type="text" id="reg-name">
            </div>
        </div>

        <div class="form-group">
            <label>EMAIL_ADDRESS</label>
            <input type="email" id="auth-email">
        </div>

        <div class="form-group">
            <label>SECURITY_KEY</label>
            <input type="password" id="auth-pass">
        </div>

        <button class="btn-main" id="auth-btn" onclick="handleSubmit()">AUTHORIZE</button>
        
        <div id="message"></div>
        <span class="toggle-link" id="toggle-ui" onclick="toggleAuth()">New Identity? Register</span>
    </div>

    <script src="core.js"></script>
    <script>
        let isLogin = true;

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'IDENTIFY_USER' : 'CREATE_IDENTITY';
            document.getElementById('reg-fields').style.display = isLogin ? 'none' : 'block';
            document.getElementById('auth-btn').innerText = isLogin ? 'AUTHORIZE' : 'CONFIRM_REGISTRATION';
            document.getElementById('toggle-ui').innerText = isLogin ? 'New Identity? Register' : 'Existing User? Login';
        }

        function handleSubmit() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const msg = document.getElementById('message');

            if (isLogin) {
                const res = SysCore.login(email, pass);
                if (res.success) {
                    msg.style.color = "white";
                    msg.innerText = "ACCESS GRANTED. Redirecting...";
                    setTimeout(() => {
                        window.location.href = (res.role === 'root') ? 'admin.html' : 'dashboard.html';
                    }, 1000);
                } else {
                    msg.style.color = "gray";
                    msg.innerText = res.msg;
                }
            } else {
                const name = document.getElementById('reg-name').value;
                const res = SysCore.register(name, email, pass);
                msg.innerText = res.msg;
                if (res.success) toggleAuth();
            }
        }
    </script>
</body>
</html>
