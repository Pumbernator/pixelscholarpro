<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelScholar Pro // Obsidian</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --slate: #1a1a1a;
            --silver: #e0e0e0;
            --dim: #666666;
            --border: rgba(255,255,255,0.1);
        }

        body {
            margin: 0;
            background-color: var(--obsidian);
            color: var(--silver);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Technical Grid Background */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-200px);
            z-index: -1;
            opacity: 0.3;
        }

        .nexus-container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin-bottom: 40px;
            font-size: 3rem;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .ghost-btn {
            padding: 15px 40px;
            border: 1px solid var(--silver);
            background: transparent;
            color: var(--silver);
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
        }

        .ghost-btn:hover {
            background: var(--silver);
            color: var(--obsidian);
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .footer-status {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: var(--dim);
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="nexus-container">
        <h1>PixelScholar</h1>
        <div class="btn-group">
            <button class="ghost-btn" onclick="location.href='auth.html'">Establish Session</button>
            <button class="ghost-btn" onclick="location.href='about.html'">Documentation</button>
        </div>
    </div>

    <div class="footer-status">SYSTEM_STATUS: OPERATIONAL // OBSIDIAN_VERSION_1.0</div>

</body>
</html>
