<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian // Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --silver: #e0e0e0; --border: rgba(255,255,255,0.05); --dim: #444; }
        body { 
            margin: 0; background: var(--bg); color: var(--silver); 
            font-family: 'Inter', sans-serif; display: flex; height: 100vh;
        }

        /* Sidebar Navigation */
        nav {
            width: 260px; border-right: 1px solid var(--border);
            padding: 40px 20px; display: flex; flex-direction: column;
        }
        .brand { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; font-size: 0.9rem; margin-bottom: 60px; }
        .nav-item { 
            color: var(--dim); text-decoration: none; padding: 15px 0; 
            font-size: 0.75rem; letter-spacing: 2px; transition: 0.3s; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { color: var(--silver); }

        /* Main Content Viewport */
        main { flex-grow: 1; padding: 60px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 60px; }
        .user-id { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--dim); }

        .grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; }
        .module { background: var(--card); border: 1px solid var(--border); padding: 30px; }
        .module-h { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 3px; color: var(--dim); margin-bottom: 20px; text-transform: uppercase; }

        /* Registrar / GPA Input */
        .data-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input, select { 
            background: transparent; border: 1px solid var(--border); color: white; 
            padding: 10px; font-family: 'Inter'; font-size: 0.8rem; outline: none;
        }
        input:focus { border-color: var(--silver); }

        /* Terminal AI */
        .terminal { background: #000; padding: 20px; height: 200px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.8rem; color: #888; border: 1px solid var(--border); }
        .term-input { width: 100%; margin-top: 10px; border: none; border-bottom: 1px solid var(--border); }

        .btn-action { background: var(--silver); color: var(--bg); border: none; padding: 10px 20px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <div class="brand">OBSIDIAN_CORE</div>
        <div class="nav-item active">DASHBOARD</div>
        <div class="nav-item">THE_VAULT</div>
        <div class="nav-item">CURRICULUM</div>
        <div class="nav-item" style="margin-top: auto;" onclick="SysCore.logout()">DE-AUTHORIZE</div>
    </nav>

    <main>
        <div class="header">
            <div>
                <h1 style="margin:0; font-weight: 300; letter-spacing: -1px;">System Overview</h1>
                <p style="color:var(--dim); font-size: 0.9rem;">Welcome back to your synchronized study environment.</p>
            </div>
            <div class="user-id" id="display-name">USER_LOADING...</div>
        </div>

        <div class="grid">
            <div class="module">
                <div class="module-h">AI_CONSULTANT_V1</div>
                <div class="terminal" id="ai-log">
                    > Initializing connection...<br>
                    > Secure link established.<br>
                    > How can I assist your research today?
                </div>
                <input type="text" class="input term-input" id="ai-query" placeholder="Enter query..." onkeypress="if(event.key==='Enter') runQuery()">
            </div>

            <div class="module">
                <div class="module-h">GPA_REGISTRAR</div>
                <select id="uni-select" style="width:100%; margin-bottom: 20px;">
                    <option>Global Standard (4.0 Scale)</option>
                    <option>UK Honours Classification</option>
                    <option>University of Botswana (Scale 5.0)</option>
                </select>
                <div class="data-row">
                    <input type="text" id="sub-name" placeholder="Subject" style="flex:2">
                    <input type="number" id="sub-mark" placeholder="%" style="flex:1">
                </div>
                <button class="btn-action" style="width:100%" onclick="addSubject()">Record Data</button>
                <div id="gpa-stats" style="margin-top: 25px; font-size: 1.5rem; font-family: 'Orbitron';">GPA: 0.00</div>
            </div>
        </div>
    </main>

    <script src="core.js"></script>
    <script>
        // Secure Access Check
        const user = SysCore.checkAccess('student');
        document.getElementById('display-name').innerText = `USER // ${user.name.toUpperCase()}`;

        // AI Query Logic
        function runQuery() {
            const q = document.getElementById('ai-query');
            const log = document.getElementById('ai-log');
            if(!q.value) return;

            log.innerHTML += `<br><span style="color:white">> ${q.value}</span>`;
            
            // Professional AI Simulation
            setTimeout(() => {
                log.innerHTML += `<br>> Processing... Analyzing ${user.name}'s performance metrics.`;
                log.innerHTML += `<br>> RECOMMENDATION: Focus on active recall for current theory modules.`;
                log.scrollTop = log.scrollHeight;
            }, 800);
            
            q.value = '';
        }

        // GPA Logic
        let marks = [];
        function addSubject() {
            const m = parseFloat(document.getElementById('sub-mark').value);
            if(isNaN(m) || m < 0 || m > 100) return;
            
            marks.push(m);
            const avg = marks.reduce((a,b) => a+b, 0) / marks.length;
            const gpa = (avg / 100) * 4.0; // Standard 4.0 mapping
            document.getElementById('gpa-stats').innerText = `GPA: ${gpa.toFixed(2)}`;
            document.getElementById('sub-mark').value = '';
            document.getElementById('sub-name').value = '';
        }
    </script>
</body>
</html>
