<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian // Root Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --silver: #e0e0e0; --dim: #333; --accent: #fff; }
        body { margin: 0; background: var(--bg); color: var(--silver); font-family: 'Inter', sans-serif; padding: 60px; }
        .admin-header { border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 40px; }
        h1 { font-family: 'Orbitron'; font-size: 1rem; letter-spacing: 10px; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { border: 1px solid #111; padding: 20px; text-align: center; }
        .stat-val { font-family: 'Orbitron'; font-size: 2rem; display: block; margin-bottom: 5px; }
        .stat-lbl { font-size: 0.6rem; color: var(--dim); letter-spacing: 2px; }

        .system-log { background: #050505; border: 1px solid #111; padding: 20px; font-family: monospace; font-size: 0.8rem; color: #444; height: 300px; overflow-y: auto; }
        .btn-root { border: 1px solid var(--dim); background: transparent; color: var(--dim); padding: 10px 20px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-root:hover { border-color: white; color: white; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1>ROOT_ACCESS // maatla002</h1>
    </div>

    <div class="stat-grid">
        <div class="stat-card">
            <span class="stat-val" id="count-users">0</span>
            <span class="stat-lbl">REGISTERED_IDENTITIES</span>
        </div>
        <div class="stat-card">
            <span class="stat-val">ACTIVE</span>
            <span class="stat-lbl">SYSTEM_STATUS</span>
        </div>
        <div class="stat-card">
            <span class="stat-val">OFF</span>
            <span class="stat-lbl">MAINTENANCE_MODE</span>
        </div>
    </div>

    <div class="module-h" style="margin-bottom: 10px; font-family: 'Orbitron'; font-size: 0.6rem; letter-spacing: 2px;">SYSTEM_ACTIVITY_LOG</div>
    <div class="system-log" id="admin-log">
        [SYS] Initializing Administrative Shell...<br>
        [SYS] verifying root credentials for maatla002@gmail.com...<br>
        [SYS] Access Level: OMNIPOTENT.
    </div>

    <button class="btn-root" onclick="SysCore.logout()">TERMINATE_SESSION</button>

    <script src="core.js"></script>
    <script>
        // Check for Admin Role
        SysCore.checkAccess('root');

        // Load Real Stats from Database
        const users = SysCore.getUsers();
        document.getElementById('count-users').innerText = users.length;

        // Log recent registrations
        const log = document.getElementById('admin-log');
        users.forEach(u => {
            log.innerHTML += `<br>[USER_REG] ${u.name} (${u.email}) joined at ${u.created}`;
        });
    </script>
</body>
</html>
