<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian // Root Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root { --obsidian: #000; --slate: #0a0a0a; --silver: #fff; --dim: #333; }
        body { margin: 0; background: var(--obsidian); color: var(--silver); font-family: 'Inter', sans-serif; padding: 60px; }
        
        header { border-bottom: 1px solid var(--dim); padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; }
        .root-title { font-family: 'Orbitron'; letter-spacing: 10px; font-size: 0.9rem; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--slate); border: 1px solid var(--dim); padding: 30px; text-align: center; }
        .stat-val { font-family: 'Orbitron'; font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .stat-lbl { font-size: 0.6rem; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; }

        .log-area { background: #050505; border: 1px solid #111; padding: 20px; font-family: monospace; font-size: 0.8rem; color: #444; height: 250px; overflow-y: auto; }
        .btn-logout { margin-top: 40px; background: transparent; border: 1px solid var(--dim); color: var(--dim); padding: 10px 20px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.6rem; transition: 0.3s; }
        .btn-logout:hover { border-color: #fff; color: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="root-title">SYSTEM_ROOT // ADMINISTRATIVE_OVERRIDE</div>
        <div id="status" style="color: #00ff00; font-size: 0.7rem; font-family: 'Orbitron';">ONLINE</div>
    </header>

    <div class="stat-grid">
        <div class="card">
            <span class="stat-val" id="user-count">0</span>
            <span class="stat-lbl">Identities_Registered</span>
        </div>
        <div class="card">
            <span class="stat-val">ROOT</span>
            <span class="stat-lbl">Access_Level</span>
        </div>
        <div class="card">
            <span class="stat-val">1.0</span>
            <span class="stat-lbl">System_Version</span>
        </div>
    </div>

    <div class="stat-lbl" style="margin-bottom: 10px;">Security_Audit_Log</div>
    <div class="log-area" id="admin-log">
        [INIT] Initializing Administrative Shell...<br>
        [AUTH] Verifying Root Credentials...
    </div>

    <button class="btn-logout" onclick="SysCore.logout()">TERMINATE_SESSION</button>

    <script src="core.js"></script>
    <script>
        // 1. SECURITY LOCK: Only maatla002@gmail.com gets in
        const admin = SysCore.checkAccess('root');
        
        // 2. Load User Data
        const users = SysCore.getUsers();
        document.getElementById('user-count').innerText = users.length;

        // 3. Populate Log
        const log = document.getElementById('admin-log');
        log.innerHTML += `<br>[AUTH] Access Granted to ${admin.name}`;
        
        users.forEach(u => {
            log.innerHTML += `<br>[USER_REG] ${u.name} | ${u.email} | ID: ${u.id}`;
        });
    </script>
</body>
</html>
